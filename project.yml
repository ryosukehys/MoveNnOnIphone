name: MoveNnOnIphone

options:
  bundleIdPrefix: com.aivision
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MoveNnOnIphone:
    type: application
    platform: iOS
    sources:
      - path: MoveNnOnIphone
        excludes:
          - MLModels
    resources:
      - path: MoveNnOnIphone/Assets.xcassets
      - path: MoveNnOnIphone/MLModels
        optional: true
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: MoveNnOnIphone/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.aivision.MoveNnOnIphone
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: false
